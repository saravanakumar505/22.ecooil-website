<!DOCTYPE html>
<html lang="en" dir="ltr" class="scroll-smooth overflow-x-hidden">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EcoOil Platform</title>
    <meta name="description"
        content="Sign in to your EcoOil account to manage fleet services, track maintenance, and access your dashboard.">

    <script>
        const theme = localStorage.getItem('theme');
        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        const dir = localStorage.getItem('dir');
        if (dir) {
            document.documentElement.setAttribute('dir', dir);
            document.documentElement.setAttribute('lang', dir === 'rtl' ? 'ar' : 'en');
        }
    </script>
    <link rel="icon" type="image/png" href="../assets/images/logo.png">
    <link rel="apple-touch-icon" href="../assets/images/logo.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="../assets/css/output.css" rel="stylesheet">

    <style>
        .font-display {
            font-family: 'Outfit', sans-serif;
        }

        body {
            font-family: 'Inter', sans-serif;
        }

        /* Horizontal and Vertical Centering with spacing */
        .auth-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            position: relative;
            z-index: 10;
            box-sizing: border-box;
            flex-grow: 1;
        }

        /* Premium Glassmorphism Card */
        .auth-card {
            width: 100%;
            max-width: 512px;
            /* standard max-w-lg */
            border-radius: 1.5rem;
            padding: 2.5rem;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background-color: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 25px 50px -12px rgba(15, 23, 42, 0.08);
            box-sizing: border-box;
        }

        .dark .auth-card {
            background-color: rgba(15, 23, 42, 0.85);
            border-color: rgba(51, 65, 85, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Labels aligned directly above corresponding inputs using logical alignment */
        .input-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
            color: #64748b;
            text-align: start;
            /* logical alignment */
        }

        .dark .input-label {
            color: #94a3b8;
        }

        /* Icons inside inputs with proper spacing using logical padding */
        .input-field-wrapper {
            position: relative;
            width: 100%;
            display: flex;
            align-items: center;
        }

        .input-field {
            width: 100%;
            padding-block: 0.875rem;
            padding-inline-start: 2.75rem;
            /* logical start padding */
            padding-inline-end: 2.75rem;
            /* logical end padding to avoid overlap with password toggle button */
            font-size: 0.875rem;
            border-radius: 0.75rem;
            border: 1px solid #cbd5e1;
            background-color: rgba(255, 255, 255, 0.8);
            color: #0f172a;
            transition: all 0.2s ease-in-out;
            outline: none;
            box-sizing: border-box;
            text-align: start;
            /* logical alignment */
        }

        .dark .input-field {
            border-color: #334155;
            background-color: rgba(15, 23, 42, 0.6);
            color: #f8fafc;
        }

        .input-field::placeholder {
            color: #94a3b8;
            text-align: start;
            /* logical placeholder alignment */
        }

        .dark .input-field::placeholder {
            color: #475569;
        }

        .input-field:focus {
            border-color: #10b981;
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.15);
            background-color: #ffffff;
        }

        .dark .input-field:focus {
            border-color: #10b981;
            background-color: #0f172a;
        }

        /* Input field prefix icons with logical positioning */
        .prefix-icon {
            position: absolute;
            inset-inline-start: 0.875rem;
            /* logical position */
            top: 50%;
            transform: translateY(-50%);
            width: 1.125rem;
            height: 1.125rem;
            color: #94a3b8;
            pointer-events: none;
            transition: color 0.2s ease;
        }

        .input-field:focus+.prefix-icon {
            color: #10b981;
        }

        /* Password visibility toggle positioning with logical positioning */
        .password-toggle {
            position: absolute;
            inset-inline-end: 0.875rem;
            /* logical position */
            top: 50%;
            transform: translateY(-50%);
            width: 1.25rem;
            height: 1.25rem;
            color: #94a3b8;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            outline: none;
            transition: color 0.2s;
            z-index: 10;
        }

        .password-toggle:hover {
            color: #475569;
        }

        .dark .password-toggle:hover {
            color: #cbd5e1;
        }

        /* Remember Me & Forgot Password Row alignment */
        .actions-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 0.75rem;
            margin-bottom: 1.5rem;
            width: 100%;
        }

        .remember-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            color: #475569;
            cursor: pointer;
            user-select: none;
        }

        .dark .remember-label {
            color: #94a3b8;
        }

        .remember-checkbox {
            width: 1rem;
            height: 1rem;
            border-radius: 0.25rem;
            border: 1px solid #cbd5e1;
            color: #10b981;
            cursor: pointer;
            accent-color: #10b981;
        }

        .dark .remember-checkbox {
            border-color: #475569;
            background-color: #0f172a;
        }

        .forgot-link {
            font-size: 0.875rem;
            font-weight: 600;
            color: #10b981;
            text-decoration: none;
            transition: color 0.2s;
        }

        .forgot-link:hover {
            color: #059669;
        }

        /* Google and Apple Buttons side-by-side with equal dimensions */
        .social-grid {
            display: grid;
            grid-template-cols: repeat(2, minmax(0, 1fr));
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            width: 100%;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.875rem 1rem;
            border-radius: 0.75rem;
            border: 1px solid #cbd5e1;
            background-color: rgba(255, 255, 255, 0.6);
            color: #334155;
            font-size: 0.875rem;
            font-weight: 600;
            transition: all 0.2s ease-in-out;
            cursor: pointer;
            box-sizing: border-box;
        }

        .dark .social-btn {
            border-color: #334155;
            background-color: rgba(15, 23, 42, 0.4);
            color: #cbd5e1;
        }

        .social-btn:hover {
            transform: translateY(-1px);
            background-color: #f8fafc;
            border-color: #cbd5e1;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .dark .social-btn:hover {
            background-color: #1e293b;
            border-color: #475569;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        /* Flex divider perfectly centered */
        .divider-container {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
            width: 100%;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background-color: #cbd5e1;
        }

        .dark .divider-line {
            background-color: #334155;
        }

        .divider-text {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
            white-space: nowrap;
        }

        .dark .divider-text {
            color: #475569;
        }

        /* Submit Button alignment */
        .submit-btn {
            width: 100%;
            padding: 0.875rem 1.5rem;
            background-color: #10b981;
            color: #ffffff;
            font-size: 0.875rem;
            font-weight: 700;
            border: none;
            border-radius: 0.75rem;
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.2);
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            box-sizing: border-box;
        }

        .submit-btn:hover {
            background-color: #059669;
            transform: translateY(-1px);
            box-shadow: 0 10px 20px -3px rgba(16, 185, 129, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }
    </style>
</head>

<body
    class="font-sans antialiased text-slate-800 bg-gradient-to-tr from-slate-50 via-slate-100 to-emerald-50/50 dark:from-slate-950 dark:via-slate-900 dark:to-emerald-950/30 dark:text-slate-200 transition-colors duration-300 min-h-screen relative overflow-x-hidden flex flex-col justify-between">

    <!-- Decorative Blurred Background Blobs -->
    <div
        class="absolute -top-40 -start-40 w-[450px] h-[450px] bg-emerald-500/10 dark:bg-emerald-500/5 rounded-full blur-3xl pointer-events-none">
    </div>
    <div
        class="absolute -bottom-40 -end-40 w-[450px] h-[450px] bg-teal-500/10 dark:bg-teal-500/5 rounded-full blur-3xl pointer-events-none">
    </div>
    <div
        class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-emerald-500/5 dark:bg-emerald-500/2 rounded-full blur-3xl pointer-events-none">
    </div>

    <!-- Centered Card Wrapper -->
    <div class="auth-container pt-32 pb-24">
        <!-- Glassmorphism Form Card (512px max width) -->
        <div class="auth-card">

            <!-- Centered EcoOil branding logo -->
            <div class="flex justify-center mb-6">
                <a href="../index.html" class="flex items-center gap-2 hover:opacity-90 transition-opacity">
                    <img src="../assets/images/logo.png" alt="EcoOil Logo"
                        class="h-10 w-auto site-logo block dark:hidden" />
                    <img src="../assets/images/logo_dark.png" alt="EcoOil Logo"
                        class="h-10 w-auto site-logo hidden dark:block" />
                </a>
            </div>

            <!-- Centered Title and Subtitle -->
            <div class="text-center mb-8">
                <h1 class="text-3xl font-display font-extrabold text-slate-900 dark:text-white mb-2 tracking-tight">Sign
                    In</h1>
                <p class="text-slate-500 dark:text-slate-400 text-sm">Enter your credentials to access your dashboard
                </p>
            </div>

            <!-- Side-by-Side social authentication buttons -->
            <div class="social-grid">
                <button type="button" class="social-btn">
                    <svg class="h-5 w-5 shrink-0" viewBox="0 0 24 24">
                        <path
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"
                            fill="#4285F4" />
                        <path
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                            fill="#34A853" />
                        <path
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                            fill="#FBBC05" />
                        <path
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                            fill="#EA4335" />
                    </svg>
                    Google
                </button>
                <button type="button" class="social-btn">
                    <svg class="h-5 w-5 shrink-0" fill="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.546 9.103 1.519 12.09 1.013 1.454 2.208 3.09 3.792 3.039 1.52-.065 2.09-.987 3.935-.987 1.831 0 2.35.987 3.96.948 1.637-.026 2.676-1.48 3.676-2.948 1.156-1.688 1.636-3.325 1.662-3.415-.039-.013-3.182-1.221-3.22-4.857-.026-3.04 2.48-4.494 2.597-4.559-1.429-2.09-3.623-2.324-4.39-2.376-2-.156-3.675 1.09-4.61 1.09zM15.53 3.83c.843-1.012 1.4-2.427 1.245-3.83-1.207.052-2.662.805-3.532 1.818-.78.896-1.454 2.338-1.273 3.714 1.338.104 2.715-.688 3.559-1.701" />
                    </svg>
                    Apple
                </button>
            </div>

            <!-- Centered divider lines -->
            <div class="divider-container">
                <div class="divider-line"></div>
                <span class="divider-text">or continue with email</span>
                <div class="divider-line"></div>
            </div>

            <!-- Form fields -->
            <form onsubmit="event.preventDefault(); window.location.href='dashboard/index.html';" class="space-y-4">

                <!-- Company Name (Sign Up only) -->
                <div id="company-field" class="hidden">
                    <label for="company" class="input-label">Company Name</label>
                    <div class="input-field-wrapper">
                        <input type="text" id="company" name="company" placeholder="Your Company LLC"
                            class="input-field">
                        <svg class="prefix-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
                        </svg>
                    </div>
                </div>

                <!-- Email Address -->
                <div>
                    <label for="email" class="input-label">Email Address</label>
                    <div class="input-field-wrapper">
                        <input type="email" id="email" name="email" required placeholder="you@company.com"
                            class="input-field">
                        <svg class="prefix-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="2">
                            <rect width="20" height="16" x="2" y="4" rx="2" />
                            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
                        </svg>
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <label for="password" class="input-label">Password</label>
                    <div class="input-field-wrapper">
                        <input type="password" id="password" name="password" required placeholder="••••••••"
                            class="input-field">
                        <svg class="prefix-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="2">
                            <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
                            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                        </svg>

                        <!-- Password Visibility Toggle -->
                        <button type="button" id="toggle-password" class="password-toggle"
                            aria-label="Toggle Password Visibility">
                            <svg id="eye-open" class="h-5 w-5 block" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                            <svg id="eye-closed" class="h-5 w-5 hidden" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Remember Me and Forgot Password Row -->
                <div class="actions-row">
                    <label class="remember-label">
                        <input type="checkbox" class="remember-checkbox">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn-cta-primary w-full">
                    Sign In
                </button>
            </form>

            <!-- Toggle Auth Mode Link -->
            <p id="toggle-container" class="auth-footer-text">
                Don't have an account?
                <a href="#" onclick="toggleAuthMode(event)"
                    class="text-emerald-500 hover:text-emerald-600 dark:hover:text-emerald-400 font-semibold transition-colors">Create
                    free
                    account</a>
            </p>

            <!-- Footer Copyright -->
            <p class="auth-copyright">
                &copy; 2026 EcoOil Services LLC. All rights reserved.
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../assets/js/main.js"></script>

    <script>
        // Toggle between Login and Sign Up modes
        const headerTitle = document.querySelector('h1');
        const headerText = document.querySelector('.text-center.mb-8 p');
        const companyField = document.getElementById('company-field');
        const submitBtn = document.querySelector('form button.submit-btn');
        const toggleLinkContainer = document.getElementById('toggle-container');

        let isSignUpMode = false;

        function toggleAuthMode(event) {
            if (event) event.preventDefault();
            isSignUpMode = !isSignUpMode;

            if (isSignUpMode) {
                headerTitle.textContent = "Create Account";
                headerText.textContent = "Enter your details to register your fleet with EcoOil";
                companyField.classList.remove('hidden');
                document.getElementById('company').setAttribute('required', 'required');
                submitBtn.textContent = "Sign Up";
                toggleLinkContainer.innerHTML = `Already have an account? <a href="#" onclick="toggleAuthMode(event)" class="text-emerald-500 hover:text-emerald-600 dark:hover:text-emerald-400 font-semibold transition-colors">Sign In</a>`;
                window.location.hash = '#signup';
            } else {
                headerTitle.textContent = "Sign In";
                headerText.textContent = "Enter your credentials to access your dashboard";
                companyField.classList.add('hidden');
                document.getElementById('company').removeAttribute('required');
                submitBtn.textContent = "Sign In";
                toggleLinkContainer.innerHTML = `Don't have an account? <a href="#" onclick="toggleAuthMode(event)" class="text-emerald-500 hover:text-emerald-600 dark:hover:text-emerald-400 font-semibold transition-colors">Create free account</a>`;
                window.location.hash = '';
            }
        }

        // Listen for hash parameter to start in Sign Up mode directly
        if (window.location.hash === '#signup') {
            toggleAuthMode();
        }

        // Update state if hash changes
        window.addEventListener('hashchange', function () {
            if (window.location.hash === '#signup' && !isSignUpMode) {
                toggleAuthMode();
            } else if (window.location.hash !== '#signup' && isSignUpMode) {
                toggleAuthMode();
            }
        });

        // Password Visibility Toggle Logic
        const passwordInput = document.getElementById('password');
        const togglePasswordBtn = document.getElementById('toggle-password');
        const eyeOpenIcon = document.getElementById('eye-open');
        const eyeClosedIcon = document.getElementById('eye-closed');

        if (togglePasswordBtn && passwordInput) {
            togglePasswordBtn.addEventListener('click', () => {
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    eyeOpenIcon.classList.add('hidden');
                    eyeClosedIcon.classList.remove('hidden');
                } else {
                    passwordInput.type = 'password';
                    eyeOpenIcon.classList.remove('hidden');
                    eyeClosedIcon.classList.add('hidden');
                }
            });
        }

        // Ensure Lucide icons render successfully if scripts load in varying order
        function initIcons() {
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        }

        if (document.readyState !== 'loading') {
            initIcons();
        } else {
            document.addEventListener('DOMContentLoaded', initIcons);
        }
        window.addEventListener('load', initIcons);
    </script>
</body>

</html>
